name: Tests

on:
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: |
          XCODE=$(ls -d /Applications/Xcode*.app 2>/dev/null | sort -V | tail -1)
          echo "Using $XCODE"
          sudo xcode-select -s "$XCODE/Contents/Developer"
          xcodebuild -version

      - name: Resolve simulator
        id: sim
        run: |
          DEST=$(xcodebuild -project JanellsRunApp.xcodeproj -scheme JanellsRunApp -showdestinations 2>/dev/null \
            | grep 'platform:iOS Simulator' | grep 'iPhone' | head -1 \
            | sed 's/.*{ //' | sed 's/ }$//')
          echo "destination=$DEST" >> "$GITHUB_OUTPUT"
          echo "Resolved destination: $DEST"

      - name: Run tests
        run: |
          set -o pipefail
          xcodebuild test \
            -project JanellsRunApp.xcodeproj \
            -scheme JanellsRunApp \
            -destination '${{ steps.sim.outputs.destination }}' \
            -only-testing:JanellsRunAppTests \
            CODE_SIGN_IDENTITY="" CODE_SIGNING_REQUIRED=NO 2>&1 | tee build.log | tail -40
          grep -q "TEST SUCCEEDED" build.log
